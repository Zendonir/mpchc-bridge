name: "Build & Release"

on:
  push:
    branches: [main]
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run pywin32 post-install
        run: python Scripts/pywin32_postinstall.py -install
        working-directory: ${{ env.pythonLocation }}
        continue-on-error: true

      - name: Build exe with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --name mpchc-bridge `
            --icon NONE `
            --hidden-import win32timezone `
            --hidden-import pywintypes `
            service.py

      - name: Get version
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match "^v") { echo "VERSION=$tag" >> $env:GITHUB_ENV }
          else { echo "VERSION=latest" >> $env:GITHUB_ENV }

      - name: Rename artifact
        run: |
          $dest = "mpchc-bridge-${{ env.VERSION }}-windows-x64.exe"
          Copy-Item dist\mpchc-bridge.exe $dest
          $hash = (Get-FileHash $dest -Algorithm SHA256).Hash
          "$hash  $dest" | Out-File -Encoding utf8 mpchc-bridge.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpchc-bridge-${{ env.VERSION }}
          path: |
            mpchc-bridge-${{ env.VERSION }}-windows-x64.exe
            mpchc-bridge.sha256
          if-no-files-found: error

  release:
    runs-on: ubuntu-22.04
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4

      - name: Flatten artifact directories
        run: |
          for d in */; do [ -d "$d" ] && mv "$d"* ./ && rmdir "$d"; done

      - name: Create Pre-Release (main push)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: latest
          prerelease: true
          name: Development Build
          files: |
            *.exe
            *.sha256

      - name: Create Release (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          files: |
            *.exe
            *.sha256
